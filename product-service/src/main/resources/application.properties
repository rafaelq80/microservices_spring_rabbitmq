spring.application.name=product-service

server.port=8083

spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:mysql://localhost:3306/db_product_service?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo&useSSl=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Sao_Paulo

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

app.jwt.secret=Y2hhbmdlLW1lLXRvLWEtc2VjdXJlLWJhc2U2NC1lbmNvZGVkLXNlY3JldC1rZXk=

app.rabbitmq.exchange=products.exchange
app.rabbitmq.routing-key=products.created
app.rabbitmq.queue=products.queue
app.rabbitmq.durable=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method 
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.packagesToScan=com.rfl.product_service.controller
springdoc.swagger-ui.use-root-path=true